name: luna_math_adventure
description: Juego educativo infantil de matemáticas con temática mágica.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_animate: ^4.5.0
  flutter_riverpod: ^2.5.1
  flutter_svg: ^2.0.10+1
  flutter_tts: ^4.0.2
  font_awesome_flutter: ^10.7.0
  go_router: ^14.2.0
  google_fonts: ^6.2.1
  http: ^1.2.2
  just_audio: ^0.9.39
  lottie: ^3.1.2
  material_symbols_icons: ^4.2762.0
  shared_preferences: ^2.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/animations/
    - assets/audio/sfx/
    - assets/audio/sfx/ui/
    - assets/audio/sfx/feedback/
    - assets/audio/sfx/rewards/
    - assets/audio/music/
    - assets/audio/voice/
    - assets/audio/voice/es/
    - assets/audio/voice/ca/
    - assets/data/
    - assets/data/i18n/
    - assets/images/backgrounds/
    - assets/images/home/actions/
    - assets/images/characters/avatar_01/
    - assets/images/characters/avatar_02/
    - assets/images/characters/avatar_03/
    - assets/images/characters/avatar_04/
    - assets/images/characters/avatar_05/
    - assets/images/characters/avatar_06/
    - assets/images/items/
    - assets/images/rewards/accessories/
    - assets/images/rewards/badges/
    - assets/images/rewards/stickers/
    - assets/images/ui/
    - assets/images/ui/buttons/
    - assets/images/ui/panels/
    - assets/licenses/
