name: luna_math_adventure
description: Juego educativo infantil de matematicas con tematica magica.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_animate: ^4.5.0
  flutter_riverpod: ^2.5.1
  flutter_svg: ^2.0.10+1
  flutter_tts: ^4.0.2
  font_awesome_flutter: ^10.7.0
  go_router: ^14.2.0
  just_audio: ^0.9.39
  lottie: ^3.1.2
  material_symbols_icons: ^4.2762.0
  shared_preferences: ^2.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/animations/
    - assets/audio/sfx/
    - assets/audio/music/
    - assets/audio/voice/
    - assets/data/
    - assets/data/i18n/
    - assets/images/backgrounds/
    - assets/images/characters/
    - assets/images/items/
    - assets/images/rewards/
    - assets/images/ui/
    - assets/licenses/
